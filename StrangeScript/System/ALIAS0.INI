n755=  :incl
n756=  inc %i2
n757=  if (%i2 <= $nick(#,0.q)) {
n758=    if ($nick(#,%i2,q) != $me) && ($len(%mass) <= 460) { set %mass %mass $+ , $+ $nick(#,%i2,q) }
n759=    if ($nick(#,%i2,q) != $me) && ($len(%mass) > 460) { set %mass1 %mass1 $+ , $+ $nick(#,%i2,q) }
n760=    if ($nick(#,%i2,q) != $me) { inc %temp.d1 }
n761=    goto incl
n762=  }
n763=  set %i2 0
n764=  ;:incl2
n765=  ;inc %i2
n766=  ;if (%i2 <= $nick(#,0.o)) {
n767=  ;if ($nick(#,%i2,o) != $me) && ($len(%mass2) <= 460) { set %mass2 %mass2 $+ , $+ $nick(#,%i2,o) }
n768=  ;if ($nick(#,%i2,o) != $me) && ($len(%mass2) > 460) { set %mass3 %mass3 $+ , $+ $nick(#,%i2,o) }
n769=  ;if ($nick(#,%i2,o) != $me) { inc %temp.d2 }
n770=  ;goto incl2
n771=  ;}
n772=  if (%mass != $null) { .raw mode # $str(-o,%temp.d1) $replace(%mass,$chr(44),$chr(32)) $replace(%mass1,$chr(44),$chr(32)) }
n773=  ;if (%mass2 != $null) { .raw mode # $str(-o,%temp.d2) $replace(%mass2,$chr(44),$chr(32)) $replace(%mass3,$chr(44),$chr(32)) }
n774=  unset %i2 %temp.d1 %temp.d2 %mass %mass1 %mass2 %mass3
n775=  return
n776=}
n777=year { var %a 0 | while (%a <= 9) { msg $chan $+($1,%a) | inc %a } }
n778=say {
n779=  if ($1 == $null) {
n780=    $report(Say,No text sent).active
n781=    halt
n782=  }
n783=  msg $active $1-
n784=}
n785=/part {
n786=  if ($chr(35) isin $1) {
n787=    if ($2 != $null) { .raw PART $1 : $+ $2- | halt }
n788=    else { .raw part $1 : $+ $unhex.ini($master(settings,part.message)) | halt }
n789=  }
n790=  else {
n791=    if ($1 != $null) { .raw part # : $+ $1- | halt }
n792=    else { .raw part # : $+ $unhex.ini($master(settings,part.message)) | halt }
n793=  }
n794=  halt
n795=}
n796=/partall {
n797=  set %tmp.pa 1
n798=  while (%tmp.pa <= $chan(0)) {
n799=    if ($1- != $null) { .raw part $chan(%tmp.pa) : $+ $1- }
n800=    else { .raw PART $chan(%tmp.pa) : $+ $unhex.ini($key(StrangeScript,part.message)) }
n801=    inc %tmp.pa
n802=    if (%tmp.pa > $chan(0)) { break }
n803=  }
n804=  unset %tmp.pa
n805=  return
n806=}
n807=/quit {
n808=  If ($scid(0) == 0) { halt }
n809=  haltdef
n810=  if ($1 == LIST) { quit.list | return }
n811=  if ($1- == VER) { .raw quit : $+ $ver | return }
n812=  if ($1- != $null) { .raw quit : $+ $1- | return }
n813=  elseif ($master(settings,quit.message) != $null) { .raw quit : $+ $unhex.ini($master(settings,quit.message)) | return }
n814=  else { .raw quit : $+ $ver | return }
n815=}
n816=/aquit { quitall | return }
n817=/quitall {
n818=  If ($scid(0) == 0) { return }
n819=  if ($1- != $null) { scon -a quit $1- | return }
n820=  else {
n821=    if ($master(settings,quit.message) != $null) { scon -a quit $unhex.ini($master(settings,quit.message)) | return }
n822=    else { scon -a quit $ver | return }
n823=  }
n824=}
n825=/notice {
n826=  if ($1 == $null) { $report(StrangeScript,Notice,Error,$null,Nothing to do here. No channel or user destination or message).active | halt }
n827=  set %tmp.notice1 $1
n828=  set %tmp.notice2 $2-
n829=  .raw NOTICE %tmp.notice1 : $+ %tmp.notice2
n830=  $report(Notice to,%tmp.notice1,$null,--->,%tmp.notice2).active
n831=  unset %tmp.notice1 %tmp.notice2
n832=  return
n833=}
n834=AllBot {
n835=  if ($key(settings,botnick) != $null) { 
n836=    if (%AB == $null) { set %AB 1 }
n837=    .timer 1 %AB .ctcp $key(settings,botnick) DO $1-
n838=    inc %AB
n839=    .timerResetAB 1 3 set %AB 1 
n840=  }
n841=  if ($sock(@Boom*,0) != 0) { sockwrite -n @Boom* $1- }
n842=  if ($sock(@Gate*,0) != 0) { sockwrite -n @Gate* $1- }
n843=  if ($sock(@Spy*,0) != 0) { sockwrite -n @Spy* $1- }
n844=  if ($sock(@Bot*,0) != 0) { sockwrite -n @Bot* $1- }
n845=  return
n846=}
