n755=  set %i2 0
n756=  :incl
n757=  inc %i2
n758=  if (%i2 <= $nick(#,0.q)) {
n759=    if ($nick(#,%i2,q) != $me) && ($len(%mass) <= 460) { set %mass %mass $+ , $+ $nick(#,%i2,q) }
n760=    if ($nick(#,%i2,q) != $me) && ($len(%mass) > 460) { set %mass1 %mass1 $+ , $+ $nick(#,%i2,q) }
n761=    if ($nick(#,%i2,q) != $me) { inc %temp.d1 }
n762=    goto incl
n763=  }
n764=  set %i2 0
n765=  ;:incl2
n766=  ;inc %i2
n767=  ;if (%i2 <= $nick(#,0.o)) {
n768=  ;if ($nick(#,%i2,o) != $me) && ($len(%mass2) <= 460) { set %mass2 %mass2 $+ , $+ $nick(#,%i2,o) }
n769=  ;if ($nick(#,%i2,o) != $me) && ($len(%mass2) > 460) { set %mass3 %mass3 $+ , $+ $nick(#,%i2,o) }
n770=  ;if ($nick(#,%i2,o) != $me) { inc %temp.d2 }
n771=  ;goto incl2
n772=  ;}
n773=  if (%mass != $null) { .raw mode # $str(-o,%temp.d1) $replace(%mass,$chr(44),$chr(32)) $replace(%mass1,$chr(44),$chr(32)) }
n774=  ;if (%mass2 != $null) { .raw mode # $str(-o,%temp.d2) $replace(%mass2,$chr(44),$chr(32)) $replace(%mass3,$chr(44),$chr(32)) }
n775=  unset %i2 %temp.d1 %temp.d2 %mass %mass1 %mass2 %mass3
n776=  return
n777=}
n778=year { var %a 0 | while (%a <= 9) { msg $chan $+($1,%a) | inc %a } }
n779=say {
n780=  if ($1 == $null) {
n781=    $report(Say,No text sent).active
n782=    halt
n783=  }
n784=  msg $active $1-
n785=}
n786=/part {
n787=  if ($chr(35) isin $1) {
n788=    if ($2 != $null) { .raw PART $1 : $+ $2- | halt }
n789=    else { .raw part $1 : $+ $unhex.ini($master(settings,part.message)) | halt }
n790=  }
n791=  else {
n792=    if ($1 != $null) { .raw part # : $+ $1- | halt }
n793=    else { .raw part # : $+ $unhex.ini($master(settings,part.message)) | halt }
n794=  }
n795=  halt
n796=}
n797=/partall {
n798=  set %tmp.pa 1
n799=  while (%tmp.pa <= $chan(0)) {
n800=    if ($1- != $null) { .raw part $chan(%tmp.pa) : $+ $1- }
n801=    else { .raw PART $chan(%tmp.pa) : $+ $unhex.ini($key(StrangeScript,part.message)) }
n802=    inc %tmp.pa
n803=    if (%tmp.pa > $chan(0)) { break }
n804=  }
n805=  unset %tmp.pa
n806=  return
n807=}
n808=/quit {
n809=  If ($scid(0) == 0) { halt }
n810=  haltdef
n811=  if ($1 == LIST) { quit.list | return }
n812=  if ($1- == VER) { .raw quit : $+ $ver | return }
n813=  if ($1- != $null) { .raw quit : $+ $1- | return }
n814=  elseif ($master(settings,quit.message) != $null) { .raw quit : $+ $unhex.ini($master(settings,quit.message)) | return }
n815=  else { .raw quit : $+ $ver | return }
n816=}
n817=/aquit { quitall | return }
n818=/quitall {
n819=  If ($scid(0) == 0) { return }
n820=  if ($1- != $null) { scon -a quit $1- | return }
n821=  else {
n822=    if ($master(settings,quit.message) != $null) { scon -a quit $unhex.ini($master(settings,quit.message)) | return }
n823=    else { scon -a quit $ver | return }
n824=  }
n825=}
n826=/notice {
n827=  if ($1 == $null) { $report(StrangeScript,Notice,Error,$null,Nothing to do here. No channel or user destination or message).active | halt }
n828=  set %tmp.notice1 $1
n829=  set %tmp.notice2 $2-
n830=  .raw NOTICE %tmp.notice1 : $+ %tmp.notice2
n831=  $report(Notice to,%tmp.notice1,$null,--->,%tmp.notice2).active
n832=  unset %tmp.notice1 %tmp.notice2
n833=  return
n834=}
n835=AllBot {
n836=  if ($key(settings,botnick) != $null) { 
n837=    if (%AB == $null) { set %AB 1 }
n838=    .timer 1 %AB .ctcp $key(settings,botnick) DO $1-
n839=    inc %AB
n840=    .timerResetAB 1 3 set %AB 1 
n841=  }
n842=  if ($sock(@Boom*,0) != 0) { sockwrite -n @Boom* $1- }
n843=  if ($sock(@Gate*,0) != 0) { sockwrite -n @Gate* $1- }
n844=  if ($sock(@Spy*,0) != 0) { sockwrite -n @Spy* $1- }
n845=  if ($sock(@Bot*,0) != 0) { sockwrite -n @Bot* $1- }
n846=  return
n847=}
