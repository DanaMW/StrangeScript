[script]
n0=alias boom {
n1=  var %tmp.1 $1 , %tmp.2 $2 , %tmp.3 $3
n2=  ;if (%tmp.1 != $null) && (%tmp.1 !isnum) && (%tmp.2 == $null) { var %tmp.1 2 | var %tmp.2 $network }
n3=  if (%tmp.1 == $null) { var %tmp.1 2 }
n4=  if (%tmp.2 == $null) { var %tmp.2 $bAdd }
n5=  if (%tmp.2 == $null) && (%tmp.2 == $null) { var %tmp.2 $serverip }
n6=  if (%tmp.3 == $null) { var %tmp.3 6667 }
n7=  var %tmp.boom.count 1
n8=  while (%tmp.boom.count <= %tmp.1) {
n9=    if ($sock(@Boom [ $+ [ %tmp.boom.count ] ] ).name == $null) { sockopen @Boom [ $+ [ %tmp.boom.count ] ] %tmp.2 %tmp.3 }
n10=    inc %tmp.boom.count
n11=    if (%tmp.boom.count > %tmp.1) { break }
n12=  }
n13=  if ($master(settings,remotecontrol.send) == ON) {
n14=    var %xXx 0
n15=    while (%xXx <= 9) {
n16=      if (%remote.control [ $+ [ %xXx ] ] != $null) { msg $chr(61) $+ %remote.control [ $+ [ %xXx ] ] .cmd boom %tmp.1 }
n17=      inc %xXx
n18=      if (%xXx > 9) { break }
n19=    } 
n20=  }
n21=  return
n22=}
n23=on 1:SOCKOPEN:@Boom*:{
n24=  if ($sockerr > 0) { $report(Sock Error,$sockname,OPEN,$sock($sockname).wserr,$sock($sockname).wsmsg).status | return }
n25=  if ($master(settings,boom.echo) == ON) {
n26=    if ($window($sockname).x == $null) { window -aen $sockname 0 0 @StrangeSock Arial 12 }
n27=    else { window -aen $sockname 0 0 @StrangeSock Arial 12 }
n28=    titlebar $sockname ( Nick: $sock($sockname).mark ) ( Connection: To $sock($sockname,1).ip on port $sock($sockname,1).port )
n29=    echo -h $sockname 10 [15 $+ $sockname $+ 10]  $+ $lowcol $+ Connection $sock($sockname,1).status
n30=  }
n31=  var %me $lower($remove($me,$chr(94))) | var %me $remove(%me,$master(settings,away.ext))
n32=  if ($key(settings,saved.socket.password) != $null) { sockwrite -n $sockname pass $key(settings,saved.socket.password) $crlf user %me %me %me %me }
n33=  else { sockwrite -n $sockname user $rand(A,Z) $+ $rand(0,9999999) $rand(A,Z) $+ $rand(0,9999999) $rand(A,Z) $+ $rand(0,9999999) $rand(A,Z) $+ $rand(0,9999999) }
n34=  if ($read($mircdirBoom.Socket.Nick.txt,n,$right($sockname,-5)) == $null) { .write -l $+ $right($sockname,-5) $mircdirBoom.Socket.Nick.txt $rand(A,Z) $+ $rand(A,Z) $+ $rand(A,Z) $+ $rand(A,Z) $+ $rand(A,Z) }
n35=  sockmark $sockname $read($mircdirBoom.Socket.Nick.txt,n,$right($sockname,-5))
n36=  sockwrite -n $sockname nick $sock($sockname).mark
n37=  .timer 1 10 /Set.Boom.Hidden $sockname $sock($sockname).mark
n38=  if (*having problems connecting* iswm $1-) { sockwrite -n $sockname pong $19 }
n39=  if ($key(settings,boom.sock.chan) != $null) {
n40=    if ($key(settings,ircx) == ON) { if ($chr(37) isin $key(settings,boom.sock.chan)) { sockwrite -n $sockname ircx } | else { .timer 1 10 Set.sock.IRCX $sockname } }
n41=    sockwrite -n $sockname join $key(settings,boom.sock.chan) $key($key(settings,boom.sock.chan),ownerkey) 
n42=    if ($key(settings,boom.sock.nick) != $null) { sockwrite -n $sockname kick $key(settings,boom.sock.chan) $key(settings,boom.sock.nick) }
n43=    sockwrite -n $sockname mode $key(settings,boom.sock.chan) +q+q $key(settings,boss) $sock($sockname).mark
n44=  }
n45=  return
n46=}
n47=alias Set.Boom.Hidden { if ($sock($1).name != $null) { sockwrite -n $1 mode $2 +i } }
n48=alias Set.Boom.IRCX { if ($sock($1).name != $null) { sockwrite -n $1 ircx } }
n49=on 1:SOCKREAD:@Boom*:{
n50=  if ($sockerr > 0) { $report(Sock Error,$sockname,READ,$sock($sockname).wserr,$sock($sockname).wsmsg).status | fix $sockname | return }
n51=  :boomread
n52=  sockread %boom.read.line
n53=  if ($sockbr == 0) { return }
n54=  tokenize 32 %boom.read.line
n55=  if ($1 == PING) { sockwrite -n $sockname PONG $2 | set %boom.server [ $+ [ $right($sockname,-5) ] ] $2 | notice %boss. [ $ [ $network ] ] Sent a Pong }
n56=  if (invite isin %boom.read.line) { if ($remove($left(%boom.read.line,$calc($pos(%boom.read.line,$chr(33),1) -1)),$chr(58)) == $me) { sockwrite -n $sockname join $remove($gettok(%boom.read.line,4,32),58) } }
n57=  if ($remove($left(%boom.read.line,$calc($pos(%boom.read.line,$chr(33),1) -1)),$chr(58)) == $me) && ($remove($gettok(%boom.read.line,4,32),:,$chr(1)) == PING)  { sockwrite -n $sockname notice $me : $+ $chr(1) $+ PING $remove($gettok(%boom.read.line,5-6,32),$chr(1)) $+ $chr(1) | halt }
n58=  if ($remove($gettok(%boom.read.line,4,32),:,$chr(1)) == PING)  { sockwrite -n $sockname notice $remove($left(%boom.read.line,$calc($pos(%boom.read.line,$chr(33),1) -1)),$chr(58)) : $+ $chr(1) $+ PING $remove($gettok(%boom.read.line,5-6,32),$chr(1)) $+ $chr(1) | halt }
n59=  if ($master(settings,boom.echo) == ON) {
n60=    if ($2 == 372) { goto boomread }
n61=    if ($2 == 002) { goto boomread }
n62=    if ($2 == 003) { goto boomread }
n63=    if ($2 == 004) { goto boomread }
n64=    if ($2 == 251) { goto boomread }
n65=    if ($2 == 252) { goto boomread }
n66=    if ($2 == 253) { goto boomread }
n67=    if ($2 == 254) { goto boomread }
n68=    if ($2 == 255) { goto boomread }
n69=    if ($2 == 265) { goto boomread }
n70=    if ($2 == 266) { goto boomread }
n71=    if ($2 == 375) { goto boomread }
n72=    if ($2 == 376) { goto boomread }
n73=    if ($window($sockname).x == $null) { window -aen $sockname 0 0 @StrangeSock Arial }
n74=    if ($2 == privmsg) { echo -h $sockname $report(PrivMsg,$null,$null,$remove($gettok($1,1,33),:) $+ @ $+ $3,$remove($mid($1-,$pos($1-,$chr(58),2),$calc($calc($len($1-) +1) - $pos($1-,$chr(58),2))),$chr(58))) }
n75=    else { echo -h $sockname $report(InBound,$null,$null,$null,$1-) }
n76=  }
n77=  if ($2 == kick) {  
n78=    if ($4 == $sock($sockname).mark) {
n79=      sockwrite -n $sockname join $3 $key($3,ownerkey)
n80=      set %sbkicker $remove($gettok($1,1,33),:)
n81=      if (%sbkicker == $me) { sockwrite -n $sockname privmsg $3 : $+ $master(settings,socksay) | return }
n82=      elseif ($istok($key(settings,botnick),%sbkicker,44) == $true) {
n83=        set %sbvar $rand(1,3)
n84=        if (%sbvar == 1) { sockwrite -n $sockname privmsg $3 :Fucking bot | return }
n85=        if (%sbvar == 2) { sockwrite -n $sockname privmsg $3 :Why you let him do that to me? | return }
n86=        if (%sbvar == 3) { sockwrite -n $sockname privmsg $3 :You're just jealous because I'm faster than you. | return }
n87=      }
n88=      else {
n89=        ;sockwrite -n $sockname access $3 clear
n90=        sockwrite -n $sockname mode $3 -o+b $remove($gettok($1,1,33),:) $remove($gettok($1,1,33),:)
n91=        ;sockwrite -n $sockname prop $3 ownerkey : $+ $newkey
n92=        sockwrite -n $sockname kick $3 $remove($gettok($1,1,33),:) :L is for LOSER
n93=        return
n94=      }
n95=    }
n96=  }
n97=  :skip.echo
n98=  goto boomread
n99=}
n100=alias boom.deop {
n101=  if ($2 == -q) && ($4 == $me) { /sw $1 mode $5 $2+q $3 $key(settings,boss) | halt }
n102=  if ($2 == -q) && ($6 == @Boom [ $+ [ $1 ] ] ) {
n103=    sw $1 part $5
n104=    sw $1 join $5 $key($5,ownerkey)
n105=    if ($istok($key(settings,botnick),$3,44) != $true) { /sw $1 kick $5 $3 }
n106=    else { /sw $1 privmsg $5 :Rude Bot }
n107=    halt
n108=  }
n109=  if ($2 == -o) && ($4 == $me) { /sw $1 mode $5 $2+o $3 $key(settings,boss) | halt }
n110=  if ($2 == -o) && ($6 == @Boom [ $+ [ $1 ] ] ) {
n111=    sw $1 part $5
n112=    sw $1 join $5 $key($5,ownerkey)
n113=    if ($istok($key(settings,botnick),$3,44) != $true) { /sw $1 kick $5 $3 }
n114=    else { /sw $1 privmsg $5 :Nasty Bot }
n115=    halt
n116=  }
n117=  halt
n118=}
n119=on 1:INPUT:@Boom* {
n120=  echo -h $target 10[00OutBound10][00Me10] $+ :  $+ $1-
n121=  if ($1 == /msg) { if ($sock($target,0) != $null) { sockwrite -n $target privmsg $2 : $+ $3- | halt } }
n122=  if ($1 == /quit) { fix $target }
n123=  if ($1 == /clear) { clear $target | return }
n124=  if ($1 == /cycle) { sockwrite -n $target part $key(settings,boom.sock.chan) | sockwrite -n $target join $key(settings,boom.sock.chan) $key($key(settings,boom.sock.chan),ownerkey) | halt }
n125=  if ($sock($target,0) != $null) && (/* !iswm $1) { sockwrite -n $target privmsg $key(settings,boom.sock.chan) : $+ $1- | halt }
n126=  if ($sock($target,0) != $null) && (/* iswm $1) { sockwrite -n $target $remove($1-,/) | halt }
n127=}
n128=on 1:SOCKCLOSE:@Boom*:{ fix $sockname }
n129=on 1:CLOSE:@Boom*:{ fix $target }
n130=alias do.socks {
n131=  ;$report(Do.Socket,$null,$null,$1,$2-,#).active
n132=  if ($1 == !boom) { boom $2- }
n133=  elseif ($1 == !gate) { gate | halt }
n134=  elseif ($1 == !help) { $report(Sock Command,$null,$null,Commands,!boom, !gate, !fix [<num>], !join <Room>, !part [<room>], !page <nick>, !enter, !jump <to room>, !q [<nick>], !o [<nick>], !d <nick>, !raw <raw command>, !mode <raw command>, !kick <nick>, !cycle, !prop, !up <nick>, !quit <message>, !say <message>, !put <nick/room> <message>, !ctcp <room/nick>, !reply <room/nick>).active | halt }
n135=  elseif ($1 == !fix) { if ($2 == $null) { fix } | else { fix $2 } | halt }
n136=  elseif ($1 == !join) { if ($2 == $null) { sw all join # $key(#,ownerkey) | sw all mode # +q+q+q+q+q+q $me $me $me $me $me $me } | if ($2 != $null) { sw all join $2 $key($2,ownerkey) | sw all mode $2 +q+q+q+q+q+q $me $me $me $me $me $me } | halt }
n137=  elseif ($1 == !enter) { if ($2 == $null) { sw all join # $key(#,ownerkey) } | if ($2 != $null) { sw all join $2 $key($2,ownerkey) } | halt }
n138=  elseif ($1 == !part) { if ($2 == $null) { sw all part # } | if ($2 != $null) { sw all part $2 } | halt }
n139=  elseif ($1 == !page) { if ($2 == $null) { sw all privmsg $me : $+ $chr(1) $+ PAGE $+ $chr(1) | return } | if ($2 != $null) { sw all privmsg $2 : $+ $chr(1) $+ PAGE $+ $chr(1) | halt } | halt }
n140=  elseif ($1 == !q) { if ($2 == $null) { sw all mode # +q $me } | if ($2 != $null) { if ($2 != ?) { sw all mode # +q $2 } | if ($2 == ?) { sw all mode # +q $key(#,lastin) } } | halt }
n141=  elseif ($1 == !o) { if ($2 == $null) { sw all mode # +o $me } | if ($2 != $null) { if ($2 != ?) { sw all mode # +o $2 } | if ($2 == ?) { sw all mode # +o $key(#,lastin) } } | halt }
n142=  elseif ($1 == !d) { if ($2 == $null) { return } | sw all mode # -o $2 | halt }
n143=  ;elseif ($1 == !invite) { if ($2 == $null) { return } | $report(invite,$null,$null,$1,$2-,#).active | sockwrite -n @Boom* notice $2 invite # | halt |                         }
n144=  elseif ($1 == !kick) { if ($2 == $null) { return } | sw all kick # $2 | halt }
n145=  elseif ($1 == !cycle) { sw all part # | sw all join # $key(#,ownerkey) | sw all mode # +q $me | halt }
n146=  elseif ($1 == !fake) { if ($2 == $null) { return } | sw 1 kick # $2 $me | sw 2 kick # $3 | fix 1 | halt }
n147=  elseif ($1 == !quit) { if ($2 == $null) { sw all quit $me | fix | return } | else { sw all quit : $+ $replace($2-,$chr(32),$chr(160)) } | fix | halt }
n148=  elseif ($1 == !exit) { fix | halt }
n149=  elseif ($1 == !up) { if ($2 == $null) { return } | sw all join # $key(#,ownerkey) | sw all mode # +q $2 | sw all part # | halt }
n150=  elseif ($1 == !heel) { sockwrite -n @Boom* mode # -o-h $sock(@boom*,1).mark $sock(@boom*,1).mark | halt }
n151=  elseif ($1 == !jump) { if ($2 == $null) { return } | sw all part # | sw all join $2 $key($2,ownerkey) | halt }
n152=  elseif ($1 == !mode) { sw all $2- | halt }
n153=  elseif ($1 == !prop) { sw all prop # ownerkey $key(#,ownerkey) | halt }
n154=  elseif ($1 == !say) { if ($2 !isnum) { sw all privmsg # : $+ $replace($2-,$chr(32),$chr(160)) | halt } | if ($2 isnum) { if ($3 == $null) { halt } | var %tmp.ss = 1 | while (%tmp.ss <= $2) { sw all privmsg # : $+ $replace($3-,$chr(32),$chr(160)) | inc %tmp.ss | if (%tmp.ss > $2) { break } } } }
n155=  elseif ($1 == !put) { if ($2 == $null) { halt } | sw all privmsg $2 : $+ $replace($3-,$chr(32),$chr(160)) | halt }
n156=  elseif ($1 == !raw) { sw all $2- | return }
n157=  elseif ($1 == !pfuck) { sw all prop # ownerkey $rand(a,z) $+ $rand(a,z) $+ $rand(a,z) $+ $rand(a,z) $+ $rand(a,z) $+ $rand(a,z) $+ $rand(a,z) $+ $rand(a,z) | return }
n158=  elseif ($1 == !report) { var %tmp.ss = 1 | while (%tmp.ss <= $sock(@boom*,0)) { sw %tmp.ss privmsg # :boom %tmp.ss | inc %tmp.ss | if (%tmp.ss > $sock(@boom*,0)) { break } } }
n159=  elseif ($1 == !ctcp) { if ($2 == $null) { sw all privmsg $input(What person to send to,egi,StrangeScript needs input) : $+ $chr(1) $+ $input(What CTCP to send,egi,StrangeScript needs input) $+ $chr(1) | halt } | else { sw all privmsg $2 : $+ $chr(1) $+ $input(What CTCP to send,egi,StrangeScript needs input) $+ $chr(1) | halt } | halt }
n160=  elseif ($1 == !reply) { if ($2 == $null) { sw all notice $input(What person to send to,egi,StrangeScript needs input) : $+ $chr(1) $+ $input(What REPLY to send,egi,StrangeScript needs input) $+ $chr(1) | halt } | else { sw all notice $2 : $+ $chr(1) $+ $input(What CTCP to send,egi,StrangeScript needs input) $+ $chr(1) | halt } | halt }
n161=  elseif ($1 == !beer) { /say !beer $2- | halt }
n162=  elseif ($1 == !bang) { /say !bang | halt }
n163=  elseif ($1 == !reload) { /say !reload | halt }
n164=  else { $report(Socket Command,$null,$1,is not in the command list.).active | if (status !isin $window($active)) { $report(Socket Command,$null,$1,is not in the command list.).status } }
n165=  return
n166=}
