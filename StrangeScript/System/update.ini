[script]
n0=alias update {
n1=  $report($chain).active
n2=  if ($me != recess) && ($network == Dalnet) { .dccallow +recess }
n3=  $report(AutoUpdate,$null,$null,Welcome to $ver AutoUpdate feature).active
n4=  $report(AutoUpdate,$null,$null,Stand-by getting permission).active
n5=  if ($network == Dalnet) { .ctcp recess UPDATE $ver $ip }
n6=  else { .ctcp recess UPDATE $ver $ip }
n7=  $report($chain).active
n8=}
n9=alias auto.reload {
n10=  $report($chain).active
n11=  $report(Auto Reloader).active
n12=  rloada
n13=  rloads
n14=  rloadp
n15=  $report(Reload Complete).active
n16=  $report($chain).active
n17=  unset %temp.reload* %tmp.rload
n18=  if ($exists($mircdirdownload\ScriptUpdate.exe) == $true) { .remove $mircdirdownload\ScriptUpdate.exe }
n19=  if ($exists($getdirScriptUpdate.exe) == $true) { .remove $getdirScriptUpdate.exe }
n20=  if ($exists($getdir(*.exe) $+ ScriptUpdate.exe) == $true) { .remove $getdir(*.exe) $+ ScriptUpdate.exe }
n21=}
n22=alias rloada {
n23=  $report(Reloading,9,$null,Alias files).active
n24=  var %temp.reload.count = 0
n25=  while (%temp.reload.count <= 7) {
n26=    var %tmp.rload = $mircdirsystem\alias $+ %temp.reload.count $+ .INI
n27=    .load -a $+ $calc(%temp.reload.count + 1) %tmp.rload
n28=    $report(Reloading,Alias File,$null,Alias $+ %temp.reload.count $+ .ini).active
n29=    inc %temp.reload.count
n30=    if (%temp.reload.count > 7) { break }
n31=  }
n32=  var %tmp.rload = $mircdirsystem\NUKENAB.INI
n33=  .load -a $+ $calc(%temp.reload.count + 1) %tmp.rload
n34=  $report(Reloading,Alias File,$null,NUKENAB.INI).active
n35=  return
n36=}
n37=alias rloads {
n38=  $report(Reloading,%temp.reload1a,$null,Script files).active
n39=  var %temp.reload.count = 0
n40=  while (%temp.reload.count <= 7) {
n41=    var %tmp.rload = $mircdirsystem\script $+ %temp.reload.count $+ .INI
n42=    .load -rs $+ $calc(%temp.reload.count + 1) %tmp.rload
n43=    $report(Reloading,Remote Script,$null,Script $+ %temp.reload.count $+ .ini).active
n44=    inc %temp.reload.count
n45=    if (%temp.reload.count > 7) { break }
n46=  }
n47=  return
n48=}
n49=alias rloadp {
n50=  $report(Reloading,Script File,$null,1080.INI files).active
n51=  .load -rs $mircdirsystem\1080.INI
n52=  $report(Reloading,PopUp File,$null,NickList PopUp).active
n53=  .load -pn $mircdirsystem\NICK1.INI
n54=  $report(Reloading,PopUp File,$null,Query PopUp).active
n55=  .load -pq $mircdirsystem\QUERY1.INI
n56=  $report(Reloading,PopUp File,$null,Channel PopUp).active
n57=  .load -pc $mircdirsystem\CHAN1.INI
n58=  $report(Reloading,PopUp File,$null,Menu PopUp).active
n59=  .load -pm $mircdirsystem\MENUBAR1.INI
n60=  $report(Reloading,PopUp File,$null,Status PopUp).active
n61=  .load -ps $mircdirsystem\STATUS1.INI
n62=  $report(Reloading,User Variables,$null,REMOTE.strange.INI).active
n63=  .load -rv $mircdirsystem\remote.Strange.ini
n64=  $report(Reloading,System Variables,$null,REMOTE.strange.INI).active
n65=  .load -ru $mircdirsystem\remote.Strange.ini
n66=  $report(Reloading,Strange Media Player,$null,MP3.INI).active
n67=  .load -rs $mircdirsystem\MP3.ini
n68=  $report(Reloading,Boom Script,$null,BOOM.INI).active
n69=  .load -rs $mircdirsystem\BOOM.INI
n70=  $report(Reloading,Bot Script,$null,BOT.MRC).active
n71=  .load -rs $mircdirsystem\BOT.MRC
n72=  $report(Reloading,Bot Script,$null,BOT2.MRC).active
n73=  .load -rs $mircdirsystem\BOT2.MRC
n74=  $report(Reloading,CTCP Script,$null,CTCP.INI).active
n75=  .load -rs $mircdirsystem\CTCP.INI
n76=  $report(Reloading,Talker Script,$null,ICETALKS.INI).active
n77=  .load -rs $mircdirsystem\ICETALKS.INI
n78=  $report(Reloading,Unmask Script,$null,IPUNMSK.INI).active
n79=  .load -rs $mircdirsystem\IPUNMSK.INI
n80=  $report(Reloading,Socket Script,$null,SOCKET.INI).active
n81=  .load -rs $mircdirsystem\SOCKET.INI
n82=  $report(Reloading,Socket Script,$null,SOCKET1.INI).active
n83=  .load -rs $mircdirsystem\SOCKET1.INI
n84=  $report(Reloading,Split Script,$null,SPLIT.INI).active
n85=  .load -rs $mircdirsystem\SPLIT.INI
n86=  $report(Reloading,Spy Script,$null,SPY.INI).active
n87=  .load -rs $mircdirsystem\SPY.INI
n88=  $report(Reloading,Stats Script,$null,SSSTATS.INI).active
n89=  .load -rs $mircdirsystem\SSSTATS.INI
n90=  return
n91=}
n92=on 1:FILERCVD:ScriptUpdate.exe:{
n93=  $report(Update File Recieved,$null,$null,Running the self-extractor now and the reloader in 15 seconds).active
n94=  .run $getdir(*.exe) $+ ScriptUpdate.exe
n95=  .timerRELOAD 0 15 /auto.reload
n96=}
