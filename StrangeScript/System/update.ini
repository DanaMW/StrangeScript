[script]
n0=alias auto.reload {
n1=  rloads
n2=}
n3=alias rloads {
n4=  set %temp.reload1 $read($mircdirsystem\reload.txt,1)
n5=  set %temp.reload2 $read($mircdirsystem\reload.txt,2)
n6=  set %temp.reload3 $read($mircdirsystem\reload.txt,3)
n7=  set %temp.reload1a $numtok(%temp.reload1,44)
n8=  set %temp.reload2a $numtok(%temp.reload2,44)
n9=  set %temp.reload3a $numtok(%temp.reload3,44)
n10=  $report($chain).active
n11=  $report(Auto Reloader).active
n12=  $report(Reloading,%temp.reload1a,$null,Script files).active
n13=  var %temp.reload.count = 1
n14=  while (%temp.reload.count <= %temp.reload1a) {
n15=    var %tmp.rload = $mircdirsystem\ $+ $gettok(%temp.reload1,%temp.reload.count,44)
n16=    .load -rs $+ %temp.reload.count %tmp.rload
n17=    $report(Reloading,Remote Script,$null,$gettok(%temp.reload1,%temp.reload.count,44),%temp.reload.count).active
n18=    inc %temp.reload.count
n19=    if (%temp.reload.count > %temp.reload1a) { break }
n20=  }
n21=  rloada
n22=}
n23=alias rloada {
n24=  $report(Reloading,%temp.reload2a,$null,Alias files).active
n25=  var %temp.reload.count = 1
n26=  while (%temp.reload.count <= %temp.reload2a) {
n27=    var %tmp.rload = $mircdirsystem\ $+ $gettok(%temp.reload2,%temp.reload.count,44)
n28=    .load -a $+ %temp.reload.count %tmp.rload
n29=    $report(Reloading,Alias File,$null,$gettok(%temp.reload2,%temp.reload.count,44),%temp.reload.count).active
n30=    inc %temp.reload.count
n31=    if (%temp.reload.count > %temp.reload2a) { break }
n32=  }
n33=  rloadp
n34=}
n35=alias rloadp {
n36=  $report(Reloading,%temp.reload3a,$null,Popup files).active
n37=  .load -pm $mircdirsystem\ $+ $gettok(%temp.reload3,1,44)
n38=  $report(Reloading,PopUp File,$null,$gettok(%temp.reload3,1,44),MenuBar PopUp).active
n39=  .load -pn $mircdirsystem\ $+ $gettok(%temp.reload3,2,44)
n40=  $report(Reloading,PopUp File,$null,$gettok(%temp.reload3,2,44),NickList PopUp).active
n41=  .load -pq $mircdirsystem\ $+ $gettok(%temp.reload3,3,44)
n42=  $report(Reloading,PopUp File,$null,$gettok(%temp.reload3,3,44),Query PopUp).active
n43=  .load -pc $mircdirsystem\ $+ $gettok(%temp.reload3,4,44)
n44=  $report(Reloading,PopUp File,$null,$gettok(%temp.reload3,4,44),Channel PopUp).active
n45=  .load -ps $mircdirsystem\ $+ $gettok(%temp.reload3,5,44)
n46=  $report(Reloading,PopUp File,$null,$gettok(%temp.reload3,5,44),Status PopUp).active
n47=  $report(Reloading,3,$null,System  files).active
n48=  .load -ru $mircdirsystem\remote.Strange.ini
n49=  $report(Reloading,Users from file,$null,REMOTE.strange.INI).active
n50=  .load -rv $mircdirsystem\remote.Strange.ini
n51=  $report(Reloading,Variables from file,$null,REMOTE.Strange.INI).active
n52=  ;$report(Reloading,Personal Settings from file,$null,EXTALKER.INI).active
n53=  ;.load -rs $mircdirsystem\extalker.ini
n54=  $report(Reloading,Strange Media Player,$null,MP3.INI).active
n55=  .load -rs $mircdirsystem\MP3.ini
n56=  $report(Reloading,New Bot File,$null,BOT.MRC).active
n57=  .load -rs $mircdirsystem\BOT.mrc
n58=  $report(Reloading,New Bot File,$null,BOT2.MRC).active
n59=  .load -rs $mircdirsystem\BOT2.mrc
n60=  $report(Reload Complete).active
n61=  $report($chain).active
n62=  unset %temp.reload* %tmp.rload
n63=  if ($exists($mircdirdownload\ScriptUpdate.exe) == $true) { .remove $mircdirdownload\ScriptUpdate.exe }
n64=  if ($exists($getdirScriptUpdate.exe) == $true) { .remove $getdirScriptUpdate.exe }
n65=  if ($exists($getdir(*.exe) $+ ScriptUpdate.exe) == $true) { .remove $getdir(*.exe) $+ ScriptUpdate.exe }
n66=}
n67=on 1:FILERCVD:ScriptUpdate.exe:{
n68=  $report(Update File Recieved,$null,$null,Running the self-extractor now and the reloader in 15 seconds).active
n69=  .run $getdir(*.exe) $+ ScriptUpdate.exe
n70=  .timerRELOAD 0 15 /auto.reload
n71=}
