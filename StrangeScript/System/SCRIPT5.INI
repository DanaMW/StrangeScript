n226=  .Set
n227=  ..Kill
n228=  ...On: nickserv set kill on | $report(Setting kill command to ON).active
n229=  ...Off: nickserv set kill off | $report(Setting kill command to OFF).active
n230=  ..Url: nickserv set url $input(URL To Associate With:,egi,StrangeScript needs input) | $report(Setting URL on NickServ).active
n231=  .-
n232=  .List: nickserv list $input(Enter a Nick or Address:,egi,StrangeScript needs input) | $report(Using list command on NickServ).active
n233=  .Info: nickserv info $input(Enter a Nick:,egi,StrangeScript needs input) | $report(Getting info on NickServ).active
n234=  MemoServ
n235=  .MemoServ Help:memoserv help | $report(Getting help from MemoServ).active
n236=  .-
n237=  .Send Memos
n238=  ..Send Memo to User:memoserv send $$?="Memo to who? (their nick)" $$?="What do you want the memo to say?" | $report(Sending memo to user).active
n239=  ..Send Memo to OP's:memoserv send $$?="Enter Channel" $$?="What do you want the memo to say?" | $report(Sending memo to OP's).active
n240=  ..Send Memo to SOP's:memoserv sendsop $$?="Enter Channel" $$?="What do you want the memo to say?" | $report(Sending memo to SOP's).active
n241=  .-
n242=  .Read Memos
n243=  ..List Memo's:memoserv list | $report(Getting memo list from MemoServ).active
n244=  ..Read Memo:memoserv read $$?="What number memo do you wanna read?" | $report(Reading memos from MemoServ).active
n245=  ..-
n246=  ..Read Memo 1:memoserv read 1 | $report(Reading memo 1 from MemoServ).active
n247=  ..Read Memo 2:memoserv read 2 | $report(Reading memo 2 from MemoServ).active
n248=  ..Read Memo 3:memoserv read 3 | $report(Reading memo 3 from MemoServ).active
n249=  ..Read Memo 4:memoserv read 4 | $report(Reading memo 4 from MemoServ).active
n250=  ..Read Memo 5:memoserv read 5 | $report(Reading memo 5 from MemoServ).active
n251=  ..More:memoserv read $$?="What number memo do you wanna read?" | $report(Reading memos from MemoServ).active
