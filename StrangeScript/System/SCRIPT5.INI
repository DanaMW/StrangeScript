n272=  AutoJoin Setup
n273=  .Toggle AutoJoin Setting $chr(91) $key(settings,autojoin) $chr(93)
n274=  ..ON:keywrite settings autojoin ON | setupshow Auto Join $key(settings,autojoin)
n275=  ..OFF:keywrite settings autojoin OFF | setupshow Auto Join $key(settings,autojoin)
n276=  ..SPEED:keywrite settings autojoin SPEED | setupshow Auto Join $key(settings,autojoin)
n277=  .-
n278=  .Run AutoJoin:{ if ($key(settings,autojoin) == SPEED) { .raw join $key(settings,autojoinspeed) } | else { autojoin } }
n279=  .-
n280=  .Current AutoJoin Rooms
n281=  ..Click Below To Join:/halt
n282=  ..-
n283=  .. $+ $gettok($key(settings,autojoinrooms),1,44) $+ :join $gettok($key(settings,autojoinrooms),1,44)
n284=  .. $+ $gettok($key(settings,autojoinrooms),2,44) $+ :join $gettok($key(settings,autojoinrooms),2,44)
n285=  .. $+ $gettok($key(settings,autojoinrooms),3,44) $+ :join $gettok($key(settings,autojoinrooms),3,44)
n286=  .. $+ $gettok($key(settings,autojoinrooms),4,44) $+ :join $gettok($key(settings,autojoinrooms),4,44)
n287=  .. $+ $gettok($key(settings,autojoinrooms),5,44) $+ :join $gettok($key(settings,autojoinrooms),5,44)
n288=  .. $+ $gettok($key(settings,autojoinrooms),6,44) $+ :join $gettok($key(settings,autojoinrooms),6,44)
n289=  .. $+ $gettok($key(settings,autojoinrooms),7,44) $+ :join $gettok($key(settings,autojoinrooms),7,44)
n290=  .. $+ $gettok($key(settings,autojoinrooms),8,44) $+ :join $gettok($key(settings,autojoinrooms),8,44)
n291=  .. $+ $gettok($key(settings,autojoinrooms),9,44) $+ :join $gettok($key(settings,autojoinrooms),9,44)
n292=  .. $+ $gettok($key(settings,autojoinrooms),10,44) $+ :join $gettok($key(settings,autojoinrooms),10,44)
n293=  .-
n294=  .Add A Room
n295=  ..Any Room:{
n296=    var %temp.add.room = $input(Enter The Room Name,egi,StrangeScript needs input)
n297=    if (%temp.add.room != $null) {
n298=      if ($numtok($key(settings,autojoinrooms),44) < 10) { 
n299=        if ($chr(37) isin %temp.add.room) { keywrite settings autojoinrooms $addtok($key(settings,autojoinrooms),$chr(37) $ $+ + $remove(%temp.add.room,$chr(37)),44) }
n300=        if ($chr(37) !isin %temp.add.room) { keywrite settings autojoinrooms $addtok($key(settings,autojoinrooms),%temp.add.room,44) }
n301=        $report(AutoJoin,%temp.add.room,Add,to your autojoin).active
n302=      }
n303=      if ($numtok($key(settings,autojoinrooms),44) > 10) { $report(AutoJoin,%temp.add.room,Failed,Your AutoJoin can only contain 10 entries so delete some).active }
n304=    }
n305=  }
n306=  ..Current Room:{
n307=    var %temp.add.room = #
n308=    if (%temp.add.room != $null) {
n309=      if ($numtok($key(settings,autojoinrooms),44) < 10) { 
n310=        if ($chr(37) isin #) { keywrite settings autojoinrooms $addtok($key(settings,autojoinrooms),$chr(37) $ $+ + $remove(#,$chr(37)),44) }
n311=        if ($chr(37) !isin #) { keywrite settings autojoinrooms $addtok($key(settings,autojoinrooms),#,44) }
n312=        $report(AutoJoin,%temp.add.room,Add,to your autojoin).active
n313=      }
n314=      if ($numtok($key(settings,autojoinrooms),44) > 10) { $report(AutoJoin,%temp.add.room,Failed,Your AutoJoin can only contain 10 entries so delete some).active }
n315=    }
n316=  }
n317=  .Delete A Room
n318=  ..Click Below To Delete:/halt
