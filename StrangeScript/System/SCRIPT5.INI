[script]
n0=menu channel {
n1=  -
n2=  Mass Menu
n3=  .Mass Q (Selected):.raw mode # $str(+q,$snick(#,0)) $snick(#,1) $snick(#,2) $snick(#,3) $snick(#,4) $snick(#,5) $snick(#,6) $snick(#,7) $snick(#,8) $snick(#,9) $snick(#,10) $snick(#,11) $snick(#,12)
n4=  .Mass Q (all):/mq
n5=  .-
n6=  .Mass Op (Selected):.raw mode # $str(+o,$snick(#,0)) $snick(#,1) $snick(#,2) $snick(#,3) $snick(#,4) $snick(#,5) $snick(#,6) $snick(#,7) $snick(#,8) $snick(#,9) $snick(#,10) $snick(#,11) $snick(#,12)
n7=  .Mass Op (non ops):/mop
n8=  .-
n9=  .Mass Deop (non owners):/mdop
n10=  .Mass Deop (all):/mdall
n11=  .Mass Deop (Selected):.raw mode # $str(-o,$snick(#,0)) $snick(#,1) $snick(#,2) $snick(#,3) $snick(#,4) $snick(#,5) $snick(#,6) $snick(#,7) $snick(#,8) $snick(#,9) $snick(#,10) $snick(#,11) $snick(#,12)
n12=  .-
n13=  .Mass kick (all):/mkall
n14=  .Mass kick (ops):/mkopsl
n15=  .Mass kick (non ops):/mknops
n16=  .Mass kick (selected):.raw kick # $snicks*
n17=  .-
n18=  .Op Take this room:/optake #
n19=  .Take this room:/take #
n20=  .Change Take Key1:masterwrite settings take.key1 $input(Take Key One,egi,StrangeScript needs input) | setupshow Take Key One changed to $master(settings,take.key1)
n21=  .Change Take Key2:masterwrite settings take.key2 $input(Take Key One,egi,StrangeScript needs input) | setupshow Take Key Two changed to $master(settings,take.key2)
n22=  -
n23=  Channel Messaging
n24=  .Owner Notice:/qs $input(Owner Notice,egi,StrangeScript needs input)
n25=  .-
n26=  .Op Notice:/ops $input(Op Notice,egi,StrangeScript needs input)
n27=  .Op Message:/omsg $input(Op Message,egi,StrangeScript needs input)
n28=  .-
n29=  .Non-Op Notice:/non $input(Non-Op Notice,egi,StrangeScript needs input)
n30=  .Non-Op Message:/nom $input(Non-Op Message,egi,StrangeScript needs input)
n31=  .-
n32=  .Current Channel Notice:var %temp = $input(Channel Notice,egi,StrangeScript needs input) | notice # $report($null,Channel Message,$null,$null,%temp)
n33=  .Current Channel message:var %temp = $input(Channel Message,egi,StrangeScript needs input) | msg # $report($null,Channel Message,$null,$null,%temp)
n34=  .-
n35=  .All Channel message:set %temp $input(All Channel Message,egi,StrangeScript needs input) | amsg $highcol $+ Channel Message: 09 %temp | unset %temp
n36=  -
n37=  Channel CTCP
n38=  .Ping:.ctcp # ping
n39=  .Version:.ctcp # VERSION
n40=  .Page:.ctcp # PAGE $input(PAGE message,egi,StrangeScript needs input)
n41=  .MESSAGE:.ctcp # MESSAGE $input(Message to send,egi,StrangeScript needs input)
n42=  .Time:.ctcp # TIME
n43=  .Userinfo:.ctcp # USERINFO
n44=  .Clientinfo:.ctcp # CLIENTINFO
n45=  .Script:.ctcp # SCRIPT
n46=  .Other ?:.ctcp # $input(Ctcp to send,egi,StrangeScript needs input)
n47=  -
n48=  Away Menu
n49=  .Away Menu
n50=  ..Set Away:/away
n51=  ..Set Away new message:/away $input(Your away message,egi,StrangeScript needs input)
n52=  ..Set BRB:/away BRB
n53=  ..Set Back:/BACK
n54=  ..-
n55=  ..Read Away Messages:/away.message.read READ
n56=  ..Delete Away Messages:/away.message.read DELETE
n57=  Nick Menu
n58=  .Set Saved Nicks
n59=  ..Set One $chr(91) $key(settings,savednick1) $chr(93) $+ :3333333333333333333333333333333333333333333333333333333333333333333333333333333333333333333333333333333333333 settings savednick1 $input(Enter the first saved nickname,egi,StrangeScript needs input) | setupshow $key(settings,savednick1) | halt
n60=  ..Set Two $chr(91) $key(settings,savednick2) $chr(93) $+ :keywrite settings savednick2 $input(Enter the second saved nickname,egi,StrangeScript needs input) | setupshow $key(settings,savednick2) | halt
n61=  ..Set Three $chr(91) $key(settings,savednick3) $chr(93) $+ :keywrite settings savednick3 $input(Enter the third saved nickname,egi,StrangeScript needs input) | setupshow $key(settings,savednick3) | halt
n62=  ..Set Four $chr(91) $key(settings,savednick4) $chr(93) $+ :keywrite settings savednick4 $input(Enter the fourth saved nickname,egi,StrangeScript needs input) | setupshow $key(settings,savednick4) | halt
n63=  ..Set Five $chr(91) $key(settings,savednick5) $chr(93) $+ :keywrite settings savednick5 $input(Enter the fifth saved nickname,egi,StrangeScript needs input) | setupshow $key(settings,savednick5) | halt
n64=  .Change Nick:/nick $$?="Enter your new nickname:"
n65=  .Recent Nicks
n66=  .. $+ $key(settings,savednick1) $+ :nick $key(settings,savednick1)
n67=  .. $+ $key(settings,savednick2) $+ :nick $key(settings,savednick2)
n68=  .. $+ $key(settings,savednick3) $+ :nick $key(settings,savednick3)
n69=  .. $+ $key(settings,savednick4) $+ :nick $key(settings,savednick4)
n70=  ..-
n71=  .. $+ $gettok($key(settings,nicklist),1,44) $+ :nick $gettok($key(settings,nicklist),1,44)
n72=  .. $+ $gettok($key(settings,nicklist),2,44) $+ :nick $gettok($key(settings,nicklist),2,44)
n73=  .. $+ $gettok($key(settings,nicklist),3,44) $+ :nick $gettok($key(settings,nicklist),3,44)
n74=  .. $+ $gettok($key(settings,nicklist),4,44) $+ :nick $gettok($key(settings,nicklist),4,44)
n75=  .. $+ $gettok($key(settings,nicklist),5,44) $+ :nick $gettok($key(settings,nicklist),5,44)
n76=  .. $+ $gettok($key(settings,nicklist),6,44) $+ :nick $gettok($key(settings,nicklist),6,44)
n77=  .. $+ $gettok($key(settings,nicklist),7,44) $+ :nick $gettok($key(settings,nicklist),7,44)
n78=  .. $+ $gettok($key(settings,nicklist),8,44) $+ :nick $gettok($key(settings,nicklist),8,44)
n79=  .. $+ $gettok($key(settings,nicklist),9,44) $+ :nick $gettok($key(settings,nicklist),9,44)
n80=  .. $+ $gettok($key(settings,nicklist),10,44) $+ :nick $gettok($key(settings,nicklist),10,44)
n81=  .Random Nickname:/rand
n82=  .Auto Nick Changer
n83=  ..Start Nick Changer:/nicktime
n84=  ..Stop Nick Changer:.timerNick. $+ $network OFF | /set %nicktime.active OFF | $report(Nick Change,$null,$null,Timer has been halted).chan
n85=  ..Set Timer Method $key(settings,nicktime.type)
n86=  ...Random:keywrite settings nicktime.type RAND | setupshow Random Nick Method $key(settings,nicktime.type)
n87=  ...List:keywrite settings nicktime.type LIST | setupshow Random Nick Method $key(settings,nicktime.type)
n88=  .Nick Recovery Options
n89=  ..Recover Nick:keywrite settings recover $$?="Enter nick to recover" | recover
n90=  ..Stop Recover: keywrite settings recover
n91=  -
n92=  ChanServ
n93=  .ChanServ Help: chanserv help | $report(Getting help from ChanServ).active
n94=  .-
n95=  .Identify Yourself to ?:var %tmp = $input(Channel to identify to,egi,StrangeScript needs input,#) | chanserv identify %tmp $readini($textdir $+ PassWord.ini,n,$network,%tmp) | $report(Identifying to ChanServ for %tmp using $readini($textdir $+ PassWord.ini,n,$network,%tmp)).active
n96=  .Identify Yourself to # $+: { chanserv identify # $readini($textdir $+ PassWord.ini,n,$network,#) | $report(Identifying to ChanServ for # using $readini($textdir $+ PassWord.ini,n,$network,#)).active }
n97=  .Any Command
n98=  ..Any Channel: chanserv $input(Enter Command,egi,StrangeScript needs input) $input(Enter Channel,egi,StrangeScript needs input) $input(Enter Parameters,egi,StrangeScript needs input) | $report(Sending Command to ChanServ).active
n99=  ..This Channel: chanserv $input(Enter Command,egi,StrangeScript needs input,60) # $input(Enter Parameters,egi,StrangeScript needs input) | $report(Sending Command to ChanServ).active
n100=  .-
n101=  .Register Channel ?:chanserv register $input(Enter Channel,egi,StrangeScript needs input) $input(Enter Password,egi,StrangeScript needs input) $input(Enter Description) | $report(Registering Channel with to ChanServ).active
n102=  .Register Channel # $+ :chanserv register # $input(Enter Password,egi,StrangeScript needs input) $input(Enter Description,egi,StrangeScript needs input) | $report(Registering # with to ChanServ).active
n103=  .Drop Channel ?:chanserv drop $input(Enter Channel,egi,StrangeScript needs input) | $report(Dropping Channel from ChanServ).active
n104=  .Drop Channel # $+ :chanserv drop # | $report(Dropping Channel # from ChanServ).active
n105=  .-
n106=  . $+ $ss.pop.serverDalChanAcs
n107=  ..AutoKick
n108=  ...Add AutoKick ?:chanserv akick $input(Enter Channel,egi,StrangeScript needs input) add $input(Enter Nick/Hostmask,egi,StrangeScript needs input) | $report(Adding AKICK to Channel on ChanServ).active
n109=  ...Add AutoKick # $+ :chanserv akick # add $input(Enter Nick/Hostmask,egi,StrangeScript needs input) | $report(Adding AKICK to # on ChanServ).active
n110=  ...Remove Autokick ?:chanserv akick $input(Enter Channel,egi,StrangeScript needs input) del $input(Enter Nick/Hostmask,egi,StrangeScript needs input) | $report(Removing AKICK from Channel on ChanServ).active
n111=  ...Remove Autokick # $+ :chanserv akick # del $input(Enter Nick/Hostmask,egi,StrangeScript needs input) | $report(Removing AKICK from # on ChanServ).active
n112=  ...AutoKick List ?:chanserv akick $input(Enter Channel,egi,StrangeScript needs input) list | $report(Getting AKICK list for Channel from ChanServ).active
n113=  ...AutoKick List # $+ :chanserv akick # list | $report(Getting AKICK list for # from ChanServ).active
n114=  ..-
n115=  ..SOP
n116=  ...Add SuperOp ?: chanserv sop $input(Enter Channel,egi,StrangeScript needs input) add $input(Enter Nick/Hostmask,egi,StrangeScript needs input) | $report(Adding SOP to Channel on ChanServ).active
n117=  ...Add SuperOp # $+ : chanserv sop # add $input(Enter Nick/Hostmask,egi,StrangeScript needs input) | $report(Adding SOP to Channel on ChanServ).active
n118=  ...Remove SuperOp ?: chanserv sop $input(Enter Channel,egi,StrangeScript needs input) del $input(Enter Nick/Hostmask,egi,StrangeScript needs input) | $report(Removing SOP from Channel on ChanServ).active
n119=  ...Remove SuperOp # $+ : chanserv sop # del $input(Enter Nick/Hostmask,egi,StrangeScript needs input) | $report(Removing SOP from Channel on ChanServ).active
n120=  ...List of SuperOps ?: chanserv sop $input(Enter Channel,egi,StrangeScript needs input) list | $report(Getting SOP list for Channel from ChanServ).active
n121=  ...List of SuperOps # $+ : chanserv sop # list | $report(Getting SOP list for Channel # from ChanServ).active
n122=  ..AOP
n123=  ...Add AutoOp ?: chanserv aop $input(Enter Channel,egi,StrangeScript needs input) add $input(Enter Nick/Hostmask,egi,StrangeScript needs input) | $report(Adding AOP to Channel on ChanServ).active
n124=  ...Add AutoOp # $+ : chanserv aop # add $input(Enter Nick/Hostmask,egi,StrangeScript needs input) | $report(Adding AOP to Channel on ChanServ).active
n125=  ...Remove AutoOp ?: chanserv aop $input(Enter Channel,egi,StrangeScript needs input) del $input(Enter Nick/Hostmask,egi,StrangeScript needs input) | $report(Removing AOP from Channel on ChanServ).active
n126=  ...Remove AutoOp # $+ : chanserv aop # del $input(Enter Nick/Hostmask,egi,StrangeScript needs input) | $report(Removing AOP from Channel on ChanServ).active
n127=  ...List of AutoOps ?: chanserv aop $input(Enter Channel,egi,StrangeScript needs input) list | $report(Getting AOP list for Channel from ChanServ).active
n128=  ...List of AutoOps # $+ : chanserv aop # list | $report(Getting AOP list for Channel # from ChanServ).active
n129=  ..-
n130=  ..Count All ?: chanserv count $input(Enter Channel,egi,StrangeScript needs input) | $report(Getting channel count for Channel from ChanServ).active
n131=  ..Count All # $+ : chanserv count # | $report(Getting channel count for Channel # from ChanServ).active
n132=  . $+ $ss.pop.serverCyChanAcs
n133=  ..AutoKick
n134=  ...Add AutoKick: chanserv akick $input(Enter Channel,egi,StrangeScript needs input) add $input(Enter Nick/Hostmask,egi,StrangeScript needs input) | $report(Adding AKICK to Channel on ChanServ).active
n135=  ...Remove Autokick: chanserv akick $input(Enter Channel,egi,StrangeScript needs input) del $input(Enter Nick/Hostmask,egi,StrangeScript needs input) | $report(Removeing AKICK from Channel on ChanServ)
n136=  ...AutoKick List: chanserv akick $input(Enter Channel,egi,StrangeScript needs input) list | $report(Getting AKICK list for Channel from ChanServ).active
n137=  ..-
n138=  ..Add Level
n139=  ...Level -100 (Deopped): chanserv access $input(Enter Channel,egi,StrangeScript needs input) add $input(NickName,egi,StrangeScript needs input) -100 | $report(Adding Level -100 (Deopped) to Channel on ChanServ).active
n140=  ...Level 5 (Aop): chanserv access $input(Enter Channel,egi,StrangeScript needs input) add $input(NickName,egi,StrangeScript needs input) 5 | $report(Adding Level 5 (AOP) to Channel on ChanServ).active
n141=  ...Level 10 (Sop): chanserv access $input(Enter Channel,egi,StrangeScript needs input) add $input(NickName,egi,StrangeScript needs input) 10 | $report(Adding Level 10 (SOP) to Channel on ChanServ).active
n142=  ...Level 100 (Co-Founder): chanserv access $input(Enter Channel,egi,StrangeScript needs input) add $input(NickName,egi,StrangeScript needs input) 100 | $report(Adding Level 100 (Co-Founder) to Channel on ChanServ).active
n143=  ...Level ?: chanserv access $report(Enter Channel,egi,StrangeScript needs input) add $input(NickName,egi,StrangeScript needs input) $input(Level,egi,StrangeScript needs input) | $report(Adding Level $! to Channel on ChanServ).active
n144=  ..Del Level: chanserv access $input(Enter Channel,egi,StrangeScript needs input) del $input(NickName/Nr,egi,StrangeScript needs input) | $report(Deleteing Level for $! on Channel with ChanServ).active
n145=  ..List Level: chanserv access $input(Enter Channel,egi,StrangeScript needs input) list | $report(Getting Access List for Channel on ChanServ).active
n146=  .-
n147=  .Send Memos
n148=  ..Send Memo to User:memoserv send $input(Memo to who?,egi,StrangeScript needs input) $input(What do you want the memo to say?,egi,StrangeScript needs input) | $report(Sending memo to user).active
n149=  ..Send Memo to OP's:memoserv send $input(Enter Channel,egi,StrangeScript needs input) $input(What do you want the memo to say?,egi,StrangeScript needs input) | $report(Sending memo to OP's on Channel).active
n150=  ..Send Memo to SOP's:memoserv sendsop $input(Enter Channel,egi,StrangeScript needs input) $input(What do you want the memo to say?,egi,StrangeScript needs input) | $report(Sending memo to SOP's on Channel).active
n151=  .Channel Control
n152=  ..Get Ops on ?: chanserv op $input(Channel,egi,StrangeScript needs input) $me | $report(Using ChanServ to OP $me).active
n153=  ..Get Ops on # $+ : { chanserv op # $me | $report(Using ChanServ to OP $me on #).active }
n154=  ..Op Somebody ?: chanserv op $input(Enter Channel,egi,StrangeScript needs input) $input(Enter Nick,egi,StrangeScript needs input) | $report(Using ChanServ to OP on Channel).active
n155=  ..Op Somebody # $+ : chanserv op # $input(Enter Nick,egi,StrangeScript needs input) | $report(Using ChanServ to OP on Channel #).active
n156=  ..-
n157=  ..Deop Yourself ?: chanserv deop $input(Enter Channel,egi,StrangeScript needs input) $me | $report(Using ChanServ to DEOP $me on Channel).active
n158=  ..Deop Yourself # $+ : chanserv deop # $me | $report(Using ChanServ to DEOP $me on Channel #).active
n159=  ..Deop Somebody ?: chanserv deop $input(Enter Channel,egi,StrangeScript needs input) $input(Enter Nick,egi,StrangeScript needs input) | $report(Using ChanServ to DEOP on Channel).active
n160=  ..Deop Somebody # $+ : chanserv deop # $input(Enter Nick,egi,StrangeScript needs input) | $report(Using ChanServ to DEOP on Channel #).active
n161=  ..Deop Everybody ?: chanserv mdeop $input(Enter Channel,egi,StrangeScript needs input) | $report(Using ChanServ to Mass DEOP everyone on Channel).active
n162=  ..Deop Everybody # $+ : chanserv mdeop # | $report(Using ChanServ to Mass DEOP everyone on Channel #).active
n163=  ..-
n164=  ..Kick Everybody ?: chanserv mkick $input(Enter Channel,egi,StrangeScript needs input) | $report(Using ChanServ to Mass KICK everyone on Channel).active
n165=  ..Kick Everybody # $+ : chanserv mkick # | $report(Using ChanServ to Mass KICK everyone on Channel #).active
n166=  ..-
n167=  ..Unban Yourself: chanserv unban $report(Enter Channel,egi,StrangeScript needs input) $me | $report(Using ChanServ to unban $me on Channel).active
n168=  ..Clear Banlist: chanserv unban $input(Enter Channel,egi,StrangeScript needs input) all | $report(Using ChanServ to clear banlist on Channel).active
n169=  .-
n170=  .Channel Invites
n171=  ..Invite Yourself: chanserv invite $input(Enter Channel,egi,StrangeScript needs input) | $report(Using ChanServ to invite $me to Channel).active
n172=  ..Invite Someone: chanserv invite $input(Enter Channel,egi,StrangeScript needs input) $input(Enter Nick,egi,StrangeScript needs input) | $report(Using ChanServ to invite to Channel).active
n173=  .-
n174=  .Set
n175=  ..Desc: chanserv set # DESC $input(Description,egi,StrangeScript needs input) | $report(Setting Channel Description on ChanServ).active
n176=  ..Founder: chanserv set # FOUNDER | $report(Setting Channel Founder on ChanServ).active
n177=  ..Topic: chanserv set # TOPIC $input(Topic,egi,StrangeScript needs input) | $report(Setting Channel Topic on ChanServ).active
n178=  ..Mlock: chanserv set # MLOCK $input(Mode Lock +nt-islmpk,egi,StrangeScript needs input) | $report(Setting Channel Modes on ChanServ).active
n179=  ..Keep Topic
n180=  ...On: chanserv set # KEEPTOPIC ON
n181=  ...Off: chanserv set # KEEPTOPIC OFF
n182=  ..Lock Topic 
n183=  ...On: chanserv set # TOPICLOCK $input(Founder or SOP,egi,StrangeScript needs input)
n184=  ...Off: chanserv set # TOPICLOCK OFF
n185=  ..Private
n186=  ...On: chanserv set # PRIVATE ON
n187=  ...Off: chanserv set # PRIVATE OFF
n188=  ..Restricted
n189=  ...On: chanserv set # RESTRICTED ON
n190=  ...Off: chanserv set # RESTRICTED OFF
n191=  ..Secure
n192=  ...On: chanserv set # SECURE ON
n193=  ...Off: chanserv set # SECURE OFF
n194=  ..Secure Ops
n195=  ...On: chanserv set # SECUREOPS ON
n196=  ...Off: chanserv set # SECUREOPS OFF
n197=  .-
n198=  .Channel Info ?: chanserv info $input(Enter Channel,egi,StrangeScript needs input) | $report(Using ChanServ to get channel info for Channel).active
n199=  .Channel Info # $+ : chanserv info # | $report(Using ChanServ to get channel info for Channel #).active
n200=  NickServ
n201=  .NickServ Help:{ nickserv help | $report(Getting help from NickServ).active }
n202=  .-
n203=  .Identify Yourself:{ nickserv identify $readini($textdir $+ PassWord.ini,n,$network,$me) | $report(Identifying to NickServ as: $readini($textdir $+ PassWord.ini,n,$network,$me)).active }
n204=  .Identify Using
n205=  ..Saved Nick One $chr(91) $key(settings,savednick1) $chr(93) $+ :{ nickserv identify $readini($textdir $+ PassWord.ini,n,$network,savednick1) | $report(Identifying to NickServ as: $key(settings,savednick1) $readini($textdir $+ PassWord.ini,n,$network,savednick1)).active }
n206=  ..Saved Nick Two $chr(91) $key(settings,savednick2) $chr(93) $+ :{ nickserv identify $readini($textdir $+ PassWord.ini,n,$network,savednick2) | $report(Identifying to NickServ as: $key(settings,savednick2) $readini($textdir $+ PassWord.ini,n,$network,savednick2)).active }
n207=  ..Saved Nick Three $chr(91) $key(settings,savednick3) $chr(93) $+ :{ nickserv identify $readini($textdir $+ PassWord.ini,n,$network,savednick3) | $report(Identifying to NickServ as: $key(settings,savednick3) $readini($textdir $+ PassWord.ini,n,$network,savednick3)).active }
n208=  ..Saved Nick Four $chr(91) $key(settings,savednick4) $chr(93) $+ :{ nickserv identify $readini($textdir $+ PassWord.ini,n,$network,savednick4) | $report(Identifying to NickServ as: $key(settings,savednick4) $readini($textdir $+ PassWord.ini,n,$network,savednick4)).active }
n209=  .Register $me $+ :{
n210=    if ($network == dalnet) { nickserv register $input(Enter Password To Use,egi,StrangeScript needs input) $input(Enter Valid Email Address,egi,StrangeScript needs input) }
n211=    else { if ($network != Undernet) && ($network != DeepNet) { nickserv register $input(Enter Password To Use,egi,StrangeScript needs input) $input(Enter Valid Email Address,egi,StrangeScript needs input) } }
n212=    $report(Registering $me with NickServ).active
n213=  }
n214=  .Drop $me $+ :nickserv drop $me | $report(Dropping $me from NickServ).active
n215=  .-
n216=  .Access
n217=  ..Access List: nickserv access list $input(Nick To List:,egi,StrangeScript needs input) | $report(Listing access on NickServ).active
n218=  ..Add: nickserv access add $input(Enter Address:,egi,StrangeScript needs input) | $report(Adding access to $me on NickServ).active
n219=  ..Delete: nickserv access del $input(Enter Address:,egi,StrangeScript needs input) | $report(Removeing access to $me from NickServ).active
n220=  .-
n221=  .Nick Recovery
n222=  ..Release: nickserv release $input(Nick To Release:,egi,StrangeScript needs input) | $report(Using release command on NickServ).active
n223=  ..Recover: nickserv recover $input(Nick To Recover:,egi,StrangeScript needs input) $input(Enter Your Password:,egi,StrangeScript needs input) | $report(Using recover command on NickServ).active
n224=  ..Ghost: nickserv ghost $input(Name of Ghost Nick:,egi,StrangeScript needs input) $input(Enter Your Password:,egi,StrangeScript needs input) | $report(Using ghost command on NickServ).active
