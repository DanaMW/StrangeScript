n53=/color.nick {
n54=  if ($1 == $null) { $report(ERROR,in the /COLOR.NICK routine).active | halt }
n55=  var %temp.c. [ $+ [ $1 ] ] = 1
n56=  while (%temp.c. [ $+ [ $1 ] ] <= $nick($1,0)) {
n57=    cline $color(listbox text) $1 %temp.c. [ $+ [ $1 ] ]
n58=    ;var %xcx = $left($remove($nick($1,%temp.c. [ $+ [ $1 ] ] ).pnick,$nick($1,%temp.c. [ $+ [ $1 ] ] )),1)
n59=    ;var %xcz = 15 $+ %xcx $+  $+  $nick($1,%temp.c. [ $+ [ $1 ] ] )
n60=    ;.msg #Strangeout %xcz
n61=    ;goto optout
n62=    if (*Serv iswm $nick($1,%temp.c. [ $+ [ $1 ] ] )) { cline 3 $1 %temp.c. [ $+ [ $1 ] ] }
n63=    if ($istok($key(settings,botnick),$nick($1,%temp.c. [ $+ [ $1 ] ] ),44) == $true) && ($nick($1,%temp.c. [ $+ [ $1 ] ] ) != $key(settings,boss)) { cline %sc.bot $1 %temp.c. [ $+ [ $1 ] ] }
n64=    if ($sock(@Boom1).mark == $nick($1,%temp.c. [ $+ [ $1 ] ] )) { cline %sc.socket $1 %temp.c. [ $+ [ $1 ] ] }
n65=    if ($sock(@Boom2).mark == $nick($1,%temp.c. [ $+ [ $1 ] ] )) { cline %sc.socket $1 %temp.c. [ $+ [ $1 ] ] }
n66=    if ($sock(@Boom3).mark == $nick($1,%temp.c. [ $+ [ $1 ] ] )) { cline %sc.socket $1 %temp.c. [ $+ [ $1 ] ] }
n67=    if ($sock(@Boom4).mark == $nick($1,%temp.c. [ $+ [ $1 ] ] )) { cline %sc.socket $1 %temp.c. [ $+ [ $1 ] ] }
n68=    if ($sock(@Boom5).mark == $nick($1,%temp.c. [ $+ [ $1 ] ] )) { cline %sc.socket $1 %temp.c. [ $+ [ $1 ] ] }
n69=    if ($sock(@Boom6).mark == $nick($1,%temp.c. [ $+ [ $1 ] ] )) { cline %sc.socket $1 %temp.c. [ $+ [ $1 ] ] }
n70=    if ($sock(@Boom7).mark == $nick($1,%temp.c. [ $+ [ $1 ] ] )) { cline %sc.socket $1 %temp.c. [ $+ [ $1 ] ] }
n71=    if ($sock(@Boom8).mark == $nick($1,%temp.c. [ $+ [ $1 ] ] )) { cline %sc.socket $1 %temp.c. [ $+ [ $1 ] ] }
n72=    if ($sock(@Boom9).mark == $nick($1,%temp.c. [ $+ [ $1 ] ] )) { cline %sc.socket $1 %temp.c. [ $+ [ $1 ] ] }
n73=    if ($nick($1,%temp.c. [ $+ [ $1 ] ] ) == %split.nick.one) || ($nick($1,%temp.c. [ $+ [ $1 ] ] ) == %split.nick.two) { cline %sc.split $1 %temp.c. [ $+ [ $1 ] ] }
n74=    if ($level($address($nick($1,%temp.c. [ $+ [ $1 ] ] ),3)) == 4) { cline %sc.me $1 %temp.c. [ $+ [ $1 ] ] }
n75=    if ($level($address($nick($1,%temp.c. [ $+ [ $1 ] ] ),3)) == 3) { cline %sc.friend $1 %temp.c. [ $+ [ $1 ] ] }
n76=    if ($level($address($nick($1,%temp.c. [ $+ [ $1 ] ] ),3)) == 2)  { cline %sc.friend $1 %temp.c. [ $+ [ $1 ] ] }
n77=    if ($nick($1,%temp.c. [ $+ [ $1 ] ] ) == $me) && ($key(settings,away.iam) == OFF) { cline %sc.me $1 %temp.c. [ $+ [ $1 ] ] }
n78=    if ($nick($1,%temp.c. [ $+ [ $1 ] ] ) == $me) && ($key(settings,away.iam) == ON) { cline 14 $1 %temp.c. [ $+ [ $1 ] ] }
n79=    if ($istok(%away.users.nick,$nick($1,%temp.c. [ $+ [ $1 ] ] ),46) == $true) { cline 14 $1 %temp.c. [ $+ [ $1 ] ] }
n80=    :optout
n81=    inc %temp.c. [ $+ [ $1 ] ]
n82=    if (%temp.c. [ $+ [ $1 ] ] > $nick($1,0)) { break }
n83=  }
n84=  return
