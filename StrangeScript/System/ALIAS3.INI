n95=/hex {
n96=  set %hex.word ""
n97=  set %hex.word ""
n98=  set %hex.val ""
n99=  set %hex.comp ""
n100=  set %hex.val1 ""
n101=  set %hex.val2 ""
n102=  set %hex.char ""
n103=  if ($1- == $null) { set %hex.word $$?="Enter ASCII String to Hex" }
n104=  if ($1- != $null) { set %hex.word $replace($1-,$chr(32),$chr(95)) }
n105=  set %n 1
n106=  :begin
n107=  if (%n > $len(%hex.word)) { clipboard %hex.comp | goto end }
n108=  set %hex.char $asc($mid(%hex.word,%n,1))
n109=  set %hex.val1 $int($calc(%hex.char / 16))
n110=  set %hex.val2 $calc($calc(%hex.char - (%hex.val1 * 16)))
n111=  if (%hex.val1 == 10) { set %hex.val1 A }
n112=  if (%hex.val1 == 11) { set %hex.val1 B }
n113=  if (%hex.val1 == 12) { set %hex.val1 C }
n114=  if (%hex.val1 == 13) { set %hex.val1 D }
n115=  if (%hex.val1 == 14) { set %hex.val1 E }
n116=  if (%hex.val1 == 15) { set %hex.val1 F }
n117=  if (%hex.val2 == 10) { set %hex.val2 A }
n118=  if (%hex.val2 == 11) { set %hex.val2 B }
n119=  if (%hex.val2 == 12) { set %hex.val2 C }
n120=  if (%hex.val2 == 13) { set %hex.val2 D }
n121=  if (%hex.val2 == 14) { set %hex.val2 E }
n122=  if (%hex.val2 == 15) { set %hex.val2 F }
n123=  set %hex.char %hex.val1 $+ %hex.val2
n124=  set %hex.comp %hex.comp $+ %hex.char
n125=  inc %n
n126=  goto begin
n127=  :end
n128=  $report(%hex.word,$null,$null,is hexed to,%hex.comp).active
n129=  unset %hex.* %n
n130=  return
n131=}
n132=/unhex {
n133=  set %hex.word ""
n134=  set %hex.word ""
n135=  set %hex.val ""
n136=  set %hex.comp ""
n137=  set %hex.val1 ""
n138=  set %hex.val2 ""
n139=  set %hex.char ""
n140=  if ($1- == $null) { set %hex.word $$?="Enter ASCII String to Hex" }
n141=  if ($1- != $null) { set %hex.word $1- }
n142=  set %hex.word $remove(%hex.word,',^)
n143=  set %n 1
n144=  :begin
n145=  if (%n > $len(%hex.word)) { goto end }
n146=  set %hex.char $mid(%hex.word,%n,1)
n147=  if (%hex.char == A) { set %hex.char 10 }
n148=  if (%hex.char == B) { set %hex.char 11 }
n149=  if (%hex.char == C) { set %hex.char 12 }
n150=  if (%hex.char == D) { set %hex.char 13 }
n151=  if (%hex.char == E) { set %hex.char 14 }
n152=  if (%hex.char == F) { set %hex.char 15 }
n153=  set %hex.val $calc(16 * %hex.char)
n154=  inc %n
n155=  set %hex.char $mid(%hex.word,%n,1)
n156=  if (%hex.char == A) { set %hex.char 10 }
n157=  if (%hex.char == B) { set %hex.char 11 }
n158=  if (%hex.char == C) { set %hex.char 12 }
n159=  if (%hex.char == D) { set %hex.char 13 }
n160=  if (%hex.char == E) { set %hex.char 14 }
n161=  if (%hex.char == F) { set %hex.char 15 }
n162=  set %hex.val $calc(%hex.val + %hex.char)
n163=  set %hex.val $chr(%hex.val)
n164=  set %hex.comp %hex.comp $+ %hex.val
n165=  inc %n
n166=  goto begin
n167=  :end
n168=  $report(Your Hexed Submission,$null,$null,is unhexed to,$replace(%hex.comp,$chr(95),$chr(160))).chan
n169=  unset %hex.* %n
n170=  return
n171=}
