n192=/script.internal.userlist {
n193=  if ($1 == ADD) {
n194=    if ($2 == Q) { .auser 3 $myaddress($snick(#,1)) $snick(#,1) | $report(AutoOp,$snick(#,1),$myaddress($snick(#,1)),was added to user list,Op/Owner).active | return }
n195=    if ($2 == MASTER) { .auser 5 $myaddress($snick(#,1)) $snick(#,1) | $report($snick(#,1)  ( $+ $white $+ $myaddress($snick(#,1)) $+ $highcol $+ ) $lowcol was $bright $+ ADDED $lowcol $+ to user list as MASTER | .notice $snick(#,1) You have been added to $ver $+ $ver  as MASTER).active | return }
n196=    if ($2 == CHAN) { 
n197=      if ($3 == Q) { 
n198=        var %tmp = $readini($AutoOwner,n,#,$myaddress($snick(#,1)))
n199=        if (%tmp == $null) { .writeini -n $AutoOwner # $myaddress($snick(#,1)) $myaddress($snick(#,1)) | $report($snick(#,1),$myaddress($snick(#,1)),was ADDED to # for auto ops as Owner).active | return }
n200=        if (%tmp != $null) { $report($snick(#,1),$myaddress($snick(#,1)),was already listed in # for auto ops as Owner).active | return }
n201=      }
n202=      if ($3 == O) { 
n203=        var %tmp = $readini($AutoOp,n,#,$myaddress($snick(#,1)))
n204=        if (%tmp == $null) { .writeini -n $AutoOp # $myaddress($snick(#,1)) $myaddress($snick(#,1)) | $report($snick(#,1),$myaddress($snick(#,1)),was ADDED to # for auto ops as Host).active | return }
n205=        if (%tmp != $null) { $report($snick(#,1),$myaddress($snick(#,1)),was already listed in # for auto ops as Host).active | return }
n206=      }
n207=    }
n208=  }  
n209=  if ($1 == REMOVE) {
n210=    if ($2 == CHAN) {
n211=      if ($3 == Q) {
n212=        var %tmp = $readini($AutoOwner,n,#,$myaddress($snick(#,1)))
n213=        if (%tmp != $null) { 
n214=          .remini $AutoOwner # $myaddress($snick(#,1))
n215=          $report($snick(#,1),$myaddress($snick(#,1)),was REMOVED from # for auto ops as Owner).active
n216=          return
n217=        }
n218=        else { $report($snick(#,1),$myaddress($snick(#,1)),is NOT listed in this channel as OWNER).active }
n219=      }
n220=      if ($3 == O) {
n221=        var %tmp = $readini($AutoOwner,n,#,$myaddress($snick(#,1)))
n222=        if (%tmp != $null) { 
n223=          .remini $AutoOp # $myaddress($snick(#,1))
n224=          $report($snick(#,1),$myaddress($snick(#,1)),was REMOVED from # for auto ops as Host).active
n225=          return
n226=        }
n227=        else { $report($snick(#,1),$myaddress($snick(#,1)),is NOT listed in this channel as HOST).active }
n228=      }
n229=    }
n230=    if ($2 == LIST) {
n231=      .ruser $myaddress($snick(#,1))
n232=      $report($snick(#,1),$myaddress($snick(#,1)),was REMOVED from Internal Userlist).active
n233=      var %temp.intern = $chan(0)
n234=      var %temp.intern1 = 1
n235=      :listloop
n236=      if (%temp.intern1 > %temp.intern) { goto listout }
n237=      var %tmp = $readini($AutoOwner,n,$chan(%temp.intern1),$myaddress($snick(#,1)))
n238=      if (%tmp != $null) { var %temp.intern2 = $chan(%temp.intern1) | remini $AutoOwner $chan(%temp.intern1) $myaddress($snick(#,1)) | $report($snick(#,1),$myaddress($snick(#,1)),was REMOVED from %temp.intern2 for auto Owner).active }
n239=      inc %temp.intern1
n240=      goto listloop
n241=      :listout
n242=      var %temp.intern = $chan(0)
n243=      var %temp.intern1 = 1
n244=      :listloop2
n245=      if (%temp.intern1 > %temp.intern) { goto listout2 }
n246=      var %tmp = $readini($AutoOp,n,$chan(%temp.intern1),$myaddress($snick(#,1)))
n247=      if (%tmp != $null) { var %temp.intern2 = $chan(%temp.intern1) | remini $AutoOp $chan(%temp.intern1) $myaddress($snick(#,1)) | $report($snick(#,1),$myaddress($snick(#,1)),was REMOVED from %temp.intern2 for auto Host).active }
n248=      inc %temp.intern1
n249=      goto listloop2
n250=      :listout2
n251=      return
n252=    }
n253=  }
n254=  return
n255=}
